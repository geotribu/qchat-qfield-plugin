name: 🎳 Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "qfield-plugin-qchat/main.qml"
      - "tests/**"
      - ".github/workflows/tests.yml"

jobs:
  tests:

    name: 🤞 Run QField plugin unit tests
    runs-on: ubuntu-latest

    container:
      image: qgis/qgis:${{ matrix.qgis-image-tag }}
    strategy:
      matrix:
        qgis-image-tag:
          - "4.0-questing"
          # - "4.0-trixie"
        qfield-refs:
          - release-4_1
          - release-4_2
          - master
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout QField repository
        uses: actions/checkout@v6
        with:
          repository: opengisch/QField
          path: QField
          ref: ${{ matrix.qfield-refs }}

      - name: Install PyQt6 system dependencies
        run: apt install -y qt6-websockets-dev qml6-module-qtcore python3-pyqt6.qtqml python3-pyqt6.qtquick

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create venv with system site packages
        run: uv venv --system-site-packages

      - name: Add QGIS Python path
        run: |
          SITE_PACKAGES=$(uv run python -c "import site; print(site.getsitepackages()[0])")
          echo "/usr/share/qgis/python" > "$SITE_PACKAGES/qgis.pth"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests with pytest
        env:
          QGIS_IN_CI: 1
        run: xvfb-run uv run pytest tests -v --qgis_disable_gui
